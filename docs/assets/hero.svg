<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Codex ntfy Notifier</title>
  <desc id="description">One ntfy push after a Codex task is locally verified as idle across the Codex app, VS Code, WSL, and SSH.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09111f"/>
      <stop offset="0.55" stop-color="#10243a"/>
      <stop offset="1" stop-color="#10352f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <circle cx="1150" cy="54" r="180" fill="#22c55e" opacity="0.08"/>
  <circle cx="70" cy="620" r="230" fill="#22d3ee" opacity="0.07"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="72" y="72" fill="#9caec4" font-size="22" font-weight="700" letter-spacing="2.4">CODEX → NTFY</text>
    <text x="72" y="154" fill="#f8fafc" font-size="55" font-weight="800">One push when Codex</text>
    <text x="72" y="220" fill="url(#accent)" font-size="55" font-weight="800">is actually idle.</text>
    <text x="72" y="270" fill="#b8c7d9" font-size="24">No intermediate turns. No duplicate session noise.</text>

    <g transform="translate(72 326)">
      <g fill="#172c43" stroke="#33536c">
        <rect width="142" height="52" rx="26"/>
        <rect x="158" width="128" height="52" rx="26"/>
        <rect x="302" width="92" height="52" rx="26"/>
        <rect x="410" width="88" height="52" rx="26"/>
      </g>
      <g fill="#e2edf8" font-size="18" font-weight="650" text-anchor="middle">
        <text x="71" y="33">Codex app</text>
        <text x="222" y="33">VS Code</text>
        <text x="348" y="33">WSL</text>
        <text x="454" y="33">SSH</text>
      </g>
    </g>

    <g transform="translate(72 418)">
      <rect width="496" height="104" rx="20" fill="#0d1c2c" stroke="#33536c"/>
      <circle cx="50" cy="52" r="24" fill="#15372e" stroke="#4ade80"/>
      <path d="M39 52l8 8 15-18" fill="none" stroke="#4ade80" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="88" y="43" fill="#f1f5f9" font-size="20" font-weight="750">Locally verified idle</text>
      <text x="88" y="72" fill="#9fb2c8" font-size="16">later turn · goal · subagents · quiet window</text>
    </g>

    <path d="M600 320c55 0 55 0 108 0" fill="none" stroke="#5eead4" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 11"/>
    <path d="M697 309l18 11-18 11" fill="none" stroke="#5eead4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(746 166)" filter="url(#shadow)">
      <rect width="460" height="310" rx="34" fill="#f8fafc"/>
      <rect x="30" y="28" width="400" height="254" rx="24" fill="#ffffff" stroke="#d8e2ec"/>
      <circle cx="76" cy="77" r="23" fill="#dcfce7"/>
      <path d="M65 77l8 8 15-18" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="68" fill="#0f172a" font-size="17" font-weight="700">ntfy</text>
      <text x="112" y="92" fill="#64748b" font-size="14">now</text>
      <text x="56" y="148" fill="#0f172a" font-size="25" font-weight="780">Refactor authentication flow</text>
      <text x="56" y="190" fill="#475569" font-size="18">perfect-notifier · laptop · #a1b2c3d4</text>
      <rect x="56" y="225" width="172" height="34" rx="17" fill="#e8f7f1"/>
      <text x="142" y="248" fill="#147a58" font-size="14" font-weight="700" text-anchor="middle">one final notification</text>
    </g>

    <text x="72" y="586" fill="#91a7bd" font-size="18">Durable retries  ·  per-thread deduplication  ·  privacy-first defaults</text>
    <text x="1208" y="586" fill="#71869c" font-size="14" text-anchor="end">Unofficial community project</text>
  </g>
</svg>
