name: Feature request
description: Propose a focused improvement or a new supported environment.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the use case rather than sharing private session data.

        **Privacy warning:** do not attach unredacted configuration files, logs, Codex sessions, runtime state, hostnames, project paths, prompts, or assistant messages.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is difficult today, and in which environment?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the result you would like to see. Include safe examples when useful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or related tools you have tried.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include credentials, private topic names, personal paths, host details, prompts, assistant content, or unredacted runtime data.
          required: true
